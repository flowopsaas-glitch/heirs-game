<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEIRS — You Don't Play One Criminal. You Play A Family.</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
#game-container { width: 100%; height: 100%; position: relative; }
canvas { width: 100%; height: 100%; display: block; }

/* ═══════ HUD ═══════ */
#hud { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; }
#hud > * { pointer-events: auto; }

#top-bar {
  position: absolute; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 24px;
  background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
  color: #fff;
}
#district-name { font-size: 13px; text-transform: uppercase; letter-spacing: 4px; color: rgba(255,255,255,0.7); }
#game-phase { font-size: 11px; padding: 5px 14px; border-radius: 3px; background: rgba(212,168,67,0.25); color: #d4a843; letter-spacing: 3px; text-transform: uppercase; }
#world-time { font-size: 12px; color: rgba(255,255,255,0.5); letter-spacing: 1px; }

#crew-panel { position: absolute; bottom: 20px; left: 20px; display: flex; gap: 8px; }
.crew-card {
  background: rgba(0,0,0,0.75); backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
  padding: 10px 14px; min-width: 120px; transition: all 0.3s;
}
.crew-card.active { border-color: #d4a843; box-shadow: 0 0 20px rgba(212,168,67,0.2); }
.crew-card.dead { opacity: 0.3; border-color: #500; }
.crew-card .name { font-size: 11px; font-weight: 600; color: #fff; letter-spacing: 1px; }
.crew-card .role { font-size: 9px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 2px; margin-top: 2px; }
.crew-card .hp-bar { width: 100%; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 6px; overflow: hidden; }
.crew-card .hp-fill { height: 100%; background: linear-gradient(90deg, #4a8; #6c6); transition: width 0.5s; }

#minimap-container {
  position: absolute; bottom: 20px; right: 20px;
  width: 180px; height: 180px;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 50%;
  overflow: hidden;
}
#minimap-canvas { width: 100%; height: 100%; border-radius: 50%; }

#rep-panel { position: absolute; top: 60px; right: 20px; }
.rep-entry {
  font-size: 10px; padding: 5px 12px; margin-bottom: 4px;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
  border-radius: 4px; color: rgba(255,255,255,0.6);
  display: flex; justify-content: space-between; gap: 20px;
}
.rep-value.pos { color: #6a6; } .rep-value.neg { color: #a44; }

#notification-area { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); text-align: center; }
.notification {
  background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
  padding: 10px 24px; margin-top: 6px; font-size: 12px; color: rgba(255,255,255,0.8);
  animation: notifIn 0.4s ease;
}
.notification.critical { border-color: rgba(200,50,50,0.5); color: #e55; }
.notification.success { border-color: rgba(50,200,80,0.5); color: #6c6; }
@keyframes notifIn { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }

#interact-prompt {
  position: absolute; bottom: 140px; left: 50%; transform: translateX(-50%);
  font-size: 12px; color: rgba(255,255,255,0.7); letter-spacing: 1px;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
  padding: 8px 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.15);
  display: none;
}

/* Dialogue */
#dialogue-box {
  position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
  width: 550px; max-width: 90%;
  background: rgba(0,0,0,0.85); backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.15); border-radius: 12px;
  padding: 20px 24px; display: none; z-index: 50;
}
#dialogue-box.active { display: block; }
#dialogue-speaker { font-size: 11px; color: #d4a843; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px; }
#dialogue-text { font-size: 14px; color: rgba(255,255,255,0.85); line-height: 1.7; }
#dialogue-continue { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 12px; text-align: right; }

/* Planning overlay */
#planning-overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.92); backdrop-filter: blur(20px);
  display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
}
#planning-overlay.active { display: flex; }
#planning-title { font-size: 28px; color: #d4a843; letter-spacing: 8px; text-transform: uppercase; margin-bottom: 40px; font-weight: 300; }
#planning-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; max-width: 900px; width: 90%; }
.loadout-card {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px; padding: 20px; transition: all 0.2s;
}
.loadout-card:hover { border-color: rgba(212,168,67,0.5); transform: translateY(-2px); }
.loadout-card .member-name { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 12px; }
.loadout-card select, .loadout-card input {
  width: 100%; margin: 4px 0; padding: 8px 10px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.8); font-family: inherit; font-size: 11px; border-radius: 6px;
}
.loadout-card label { font-size: 9px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1px; }
#lock-orders-btn {
  margin-top: 40px; padding: 16px 50px;
  background: linear-gradient(135deg, rgba(212,168,67,0.2), rgba(212,168,67,0.05));
  border: 1px solid #d4a843; color: #d4a843; font-size: 13px; font-family: inherit;
  text-transform: uppercase; letter-spacing: 5px; cursor: pointer; transition: all 0.3s; border-radius: 6px;
}
#lock-orders-btn:hover { background: rgba(212,168,67,0.3); transform: scale(1.03); }

/* Succession */
#succession-overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.95); display: none; flex-direction: column;
  align-items: center; justify-content: center; z-index: 200;
}
#succession-overlay.active { display: flex; }
.fallen-name { font-size: 36px; color: #833; letter-spacing: 4px; margin-bottom: 12px; font-weight: 300; }
.fallen-epitaph { font-size: 13px; color: rgba(255,255,255,0.3); margin-bottom: 50px; font-style: italic; }
.successor-label { font-size: 10px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 4px; margin-bottom: 8px; }
.successor-name { font-size: 28px; color: #d4a843; letter-spacing: 3px; margin-bottom: 40px; font-weight: 300; }
.continue-btn {
  padding: 14px 36px; background: transparent; border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.5); font-family: inherit; font-size: 12px;
  text-transform: uppercase; letter-spacing: 3px; cursor: pointer; border-radius: 6px; transition: all 0.3s;
}
.continue-btn:hover { border-color: #d4a843; color: #d4a843; }

/* Title screen */
#title-screen {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, #0a0a0f 0%, #0f0a05 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 300;
}
#title-screen h1 { font-size: 80px; color: #d4a843; letter-spacing: 30px; font-weight: 200; margin-bottom: 20px; }
#title-screen .subtitle { font-size: 13px; color: rgba(255,255,255,0.35); letter-spacing: 2px; margin-bottom: 60px; text-align: center; line-height: 2; }
.start-btn {
  padding: 16px 50px; background: transparent; border: 1px solid rgba(212,168,67,0.4);
  color: #d4a843; font-family: inherit; font-size: 13px; text-transform: uppercase;
  letter-spacing: 5px; cursor: pointer; transition: all 0.3s; border-radius: 6px;
}
.start-btn:hover { background: rgba(212,168,67,0.1); border-color: #d4a843; }

/* Loading */
#loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: rgba(255,255,255,0.3); font-size: 12px; letter-spacing: 3px; z-index: 400; }
</style>
</head>
<body>
<div id="game-container">
  <div id="loading">LOADING SANTO PORTO...</div>
  
  <div id="hud">
    <div id="top-bar">
      <div id="district-name">THE NARROWS</div>
      <div id="game-phase">ROAMING</div>
      <div id="world-time">Day 1 — 21:45 — NIGHT</div>
    </div>
    
    <div id="crew-panel"></div>
    
    <div id="minimap-container"><canvas id="minimap-canvas" width="180" height="180"></canvas></div>
    <div id="rep-panel"></div>
    
    <div id="interact-prompt">[E] Talk</div>
    <div id="notification-area"></div>
    
    <div id="dialogue-box">
      <div id="dialogue-speaker"></div>
      <div id="dialogue-text"></div>
      <div id="dialogue-continue">[ SPACE to continue ]</div>
    </div>
  </div>
  
  <div id="planning-overlay">
    <div id="planning-title">LOCK IN ORDERS</div>
    <div id="planning-grid"></div>
    <button id="lock-orders-btn">COMMIT — NO TURNING BACK</button>
  </div>
  
  <div id="succession-overlay">
    <div class="fallen-name"></div>
    <div class="fallen-epitaph"></div>
    <div class="successor-label">CONTROL PASSES TO</div>
    <div class="successor-name"></div>
    <button class="continue-btn">CARRY THE NAME FORWARD</button>
  </div>
  
  <div id="title-screen">
    <h1>HEIRS</h1>
    <div class="subtitle">
      You don't play one criminal in this city.<br>
      You play a family.<br><br>
      Every job might cost you the one you were controlling.
    </div>
    <button class="start-btn">BEGIN</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="game.js"></script>
</body>
</html>
